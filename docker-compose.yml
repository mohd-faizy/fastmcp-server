services:
  mcp-server:
    build: .
    image: mohd-faizy/fastmcp-server:latest
    ports:
      - "8000:8000"          # host:container
    environment:
      MCP_TRANSPORT: sse
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8000"
    restart: unless-stopped  # auto-restart on failure or reboot


